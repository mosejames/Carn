<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CP Money Trail — Admin Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, sans-serif; background:#f5f5f5; color:#1a1a1a; }
.header { background:#722f37; color:#fff; padding:1.5rem 2rem; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.02em; }
.header .stats { display:flex; gap:1.5rem; font-size:0.85rem; }
.header .stat { text-align:center; }
.header .stat-num { font-size:1.4rem; font-weight:700; color:#d4a017; }
.container { max-width:800px; margin:2rem auto; padding:0 1rem; }
.controls { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center; }
.controls button { padding:8px 16px; border:1.5px solid #ddd; background:#fff; border-radius:6px; cursor:pointer; font-size:13px; font-family:monospace; }
.controls button.active { background:#722f37; color:#fff; border-color:#722f37; }
.controls input { flex:1; min-width:200px; padding:8px 12px; border:1.5px solid #ddd; border-radius:6px; font-size:13px; }
.q-card { background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:1rem 1.2rem; margin-bottom:0.75rem; display:flex; gap:1rem; align-items:flex-start; transition:all 0.2s; }
.q-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.q-card.flagged { border-left:4px solid #e74c3c; }
.q-score { text-align:center; min-width:50px; }
.q-score .num { font-size:1.2rem; font-weight:700; font-family:monospace; }
.q-score .num.pos { color:#722f37; }
.q-score .num.neg { color:#ccc; }
.q-score .num.zero { color:#888; }
.q-score .label { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; }
.q-body { flex:1; }
.q-text { font-size:0.95rem; line-height:1.5; margin-bottom:0.4rem; }
.q-meta { font-size:0.75rem; color:#aaa; font-family:monospace; }
.q-actions { display:flex; gap:0.5rem; margin-top:0.5rem; }
.q-actions button { padding:4px 10px; font-size:11px; border-radius:4px; cursor:pointer; font-family:monospace; border:1px solid; }
.btn-delete { background:#fff; color:#e74c3c; border-color:#e74c3c; }
.btn-delete:hover { background:#e74c3c; color:#fff; }
.btn-pin { background:#fff; color:#d4a017; border-color:#d4a017; }
.btn-pin:hover { background:#d4a017; color:#1a1a1a; }
.btn-flag { background:#fff; color:#888; border-color:#ddd; }
.btn-flag:hover { background:#f5f5f5; }
.empty { text-align:center; padding:3rem; color:#aaa; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; font-family:monospace; display:none; z-index:999; }
.login-gate { display:flex; align-items:center; justify-content:center; min-height:80vh; }
.login-box { background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); text-align:center; max-width:360px; width:100%; }
.login-box h2 { font-family:'Bebas Neue',sans-serif; color:#722f37; font-size:1.8rem; margin-bottom:0.5rem; }
.login-box input { width:100%; padding:12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; margin:1rem 0; }
.login-box button { width:100%; padding:12px; background:#722f37; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.login-box button:hover { background:#8b3a44; }
.bulk-bar { background:#722f37; color:#fff; padding:10px 16px; border-radius:8px; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; font-size:13px; }
.bulk-bar button { background:rgba(255,255,255,0.2); color:#fff; border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-family:monospace; }
.bulk-bar button:hover { background:rgba(255,255,255,0.3); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

<div id="login" class="login-gate">
  <div class="login-box">
    <h2>CP Money Trail</h2>
    <p style="color:#888; font-size:14px;">Admin Dashboard</p>
    <input type="password" id="pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <p id="pw-err" style="color:#e74c3c; font-size:12px; margin-top:8px; display:none;">Wrong password</p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>Follow the Money — Admin</h1>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-total">0</div><div>Total</div></div>
      <div class="stat"><div class="stat-num" id="s-today">0</div><div>Today</div></div>
      <div class="stat"><div class="stat-num" id="s-top">0</div><div>Score 5+</div></div>
    </div>
  </div>
  <div class="container">
    <div class="controls">
      <button class="active" id="f-all" onclick="setFilter('all')">All</button>
      <button id="f-top" onclick="setFilter('top')">Top Voted</button>
      <button id="f-new" onclick="setFilter('new')">Newest</button>
      <button id="f-flagged" onclick="setFilter('flagged')">Flagged</button>
      <input type="text" id="search" placeholder="Search questions..." oninput="doSearch()">
    </div>
    <div id="bulk" class="bulk-bar" style="display:none">
      <span><span id="sel-count">0</span> selected</span>
      <div style="display:flex;gap:8px">
        <button onclick="bulkDelete()">Delete Selected</button>
        <button onclick="clearSelection()">Cancel</button>
      </div>
    </div>
    <div id="qlist"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var ADMIN_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // sha256 of "password" — CHANGE THIS
var firebaseConfig = {
  apiKey: "AIzaSyDFDKevFIQjt2klRgaoASZWREmvFJembRo",
  authDomain: "cpmoneytrail.firebaseapp.com",
  databaseURL: "https://cpmoneytrail-default-rtdb.firebaseio.com",
  projectId: "cpmoneytrail",
  storageBucket: "cpmoneytrail.firebasestorage.app",
  messagingSenderId: "777189511511",
  appId: "1:777189511511:web:ec52f88738d9b8784b2e12"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var qRef = db.ref('questions');

var qs = [], filter = 'all', searchTerm = '', selected = new Set();

async function sha256(msg) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  var pw = document.getElementById('pw').value;
  var hash = await sha256(pw);
  if (hash === ADMIN_HASH) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('qa-admin', '1');
    init();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}

if (sessionStorage.getItem('qa-admin') === '1') {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}

function init() {
  qRef.on('value', function(snap) {
    qs = [];
    snap.forEach(function(c) { qs.push(c.val()); });
    updateStats();
    render();
  });
}

function updateStats() {
  var today = new Date(); today.setHours(0,0,0,0);
  var todayTs = today.getTime();
  document.getElementById('s-total').textContent = qs.length;
  document.getElementById('s-today').textContent = qs.filter(function(q) { return q.ts >= todayTs; }).length;
  document.getElementById('s-top').textContent = qs.filter(function(q) { return (q.up - q.down) >= 5; }).length;
}

function setFilter(f) {
  filter = f;
  ['all','top','new','flagged'].forEach(function(v) {
    document.getElementById('f-' + v).className = v === f ? 'active' : '';
  });
  render();
}

function doSearch() {
  searchTerm = document.getElementById('search').value.toLowerCase();
  render();
}

function timeAgo(ts) {
  var m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24);
  return d + 'd ago';
}

function fullDate(ts) {
  return new Date(ts).toLocaleString();
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render() {
  var arr = qs.slice();
  
  // Filter
  if (filter === 'top') arr.sort(function(a, b) { return (b.up - b.down) - (a.up - a.down); });
  else if (filter === 'new') arr.sort(function(a, b) { return b.ts - a.ts; });
  else if (filter === 'flagged') arr = arr.filter(function(q) { return q.flagged; });
  else arr.sort(function(a, b) { return b.ts - a.ts; });

  // Search
  if (searchTerm) {
    arr = arr.filter(function(q) { return q.text.toLowerCase().indexOf(searchTerm) !== -1; });
  }

  var el = document.getElementById('qlist');
  if (!arr.length) {
    el.innerHTML = '<div class="empty">No questions found.</div>';
    return;
  }

  var h = '';
  for (var i = 0; i < arr.length; i++) {
    var q = arr[i], sc = q.up - q.down;
    var cls = q.flagged ? ' flagged' : '';
    var scCls = sc > 0 ? 'pos' : sc < 0 ? 'neg' : 'zero';
    var chk = selected.has(q.id) ? 'checked' : '';
    h += '<div class="q-card' + cls + '">';
    h += '<input type="checkbox" ' + chk + ' onchange="toggleSel(\'' + q.id + '\',this.checked)" style="margin-top:4px">';
    h += '<div class="q-score"><div class="num ' + scCls + '">' + sc + '</div><div class="label">score</div>';
    h += '<div style="font-size:10px;color:#aaa;margin-top:4px">&#x25B2; ' + q.up + ' &#x25BC; ' + q.down + '</div></div>';
    h += '<div class="q-body"><div class="q-text">' + esc(q.text) + '</div>';
    h += '<div class="q-meta">' + timeAgo(q.ts) + ' &middot; ' + fullDate(q.ts) + ' &middot; ID: ' + q.id + '</div>';
    h += '<div class="q-actions">';
    h += '<button class="btn-delete" onclick="delQ(\'' + q.id + '\')">Delete</button>';
    h += '<button class="btn-flag" onclick="flagQ(\'' + q.id + '\')">' + (q.flagged ? 'Unflag' : 'Flag') + '</button>';
    h += '</div></div></div>';
  }
  el.innerHTML = h;
}

function toggleSel(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('bulk').style.display = selected.size > 0 ? 'flex' : 'none';
}

function clearSelection() {
  selected.clear();
  document.getElementById('bulk').style.display = 'none';
  render();
}

function delQ(id) {
  if (confirm('Delete this question?')) {
    qRef.child(id).remove();
    toast('Deleted');
  }
}

function bulkDelete() {
  if (confirm('Delete ' + selected.size + ' questions?')) {
    selected.forEach(function(id) { qRef.child(id).remove(); });
    toast('Deleted ' + selected.size + ' questions');
    clearSelection();
  }
}

function flagQ(id) {
  var q; for (var i = 0; i < qs.length; i++) { if (qs[i].id === id) { q = qs[i]; break; } }
  if (!q) return;
  q.flagged = !q.flagged;
  qRef.child(id).set(q);
  toast(q.flagged ? 'Flagged' : 'Unflagged');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}
</script>
</body>
</html>
